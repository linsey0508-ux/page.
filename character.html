<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파과 - Character</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: 'Nanum Myeongjo', serif;
        }

        /* 📌 상단 고정 메뉴 바 (상시 노출) */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10000;
            background-color: #000000;
            border-bottom: 1px solid #111;
            box-sizing: border-box;
        }
        .logo a {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
            text-decoration: none;
        }
        .nav-links a {
            font-size: 14px;
            margin-left: 40px;
            letter-spacing: 1px;
            text-decoration: none;
            color: #ffffff;
            transition: color 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #e50914;
        }

        .char-container {
            max-width: 900px;
            margin: 220px auto 150px auto;
            padding: 0 20px;
        }
        .char-grid {
            display: flex;
            flex-direction: column;
            gap: 120px;
        }
        .char-row {
            display: flex;
            gap: 60px;
            align-items: center;
        }
        .char-row.reverse {
            flex-direction: row-reverse;
        }
        .char-img {
            width: 280px;
            height: 380px;
            background-color: #111;
            border: 1px solid #222;
            object-fit: cover;
        }
        .char-info {
            flex: 1;
        }
        .char-name {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }
        .char-title-sub {
            font-size: 14px;
            color: #e50914;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }
        .char-desc {
            font-size: 15px;
            line-height: 2;
            color: #aaaaaa;
            word-break: keep-all;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo"><a href="index.html">파과</a></div>
        <div class="nav-links">
            <a href="index.html">STORY</a>
            <a href="character.html" class="active">CHARACTER</a>
            <a href="about.html">ABOUT</a>
            <a href="https://product.kyobobook.co.kr/detail/S000001808685" target="_blank">BUY</a>
        </div>
    </nav>

    <main class="char-container">
        <div class="char-grid">
            <!-- 캐릭터 1 -->
            <div class="char-row">
                <img src="jogak.jpg" alt="조각" class="char-img">
                <div class="char-info">
                    <h2 class="char-name">조각 (정옥)</h2>
                    <div class="char-title-sub">예순다섯의 늙은 킬러</div>
                    <p class="char-desc">40여 년간 청부살인업을 이어온 냉혹한 방역업자. 나이가 듦에 따라 몸이 예전 같지 않음을 느끼던 중, 시장에서 만난 한 과일의 상처와 타인의 삶에 불쑥 찾아든 따뜻한 감정에 동요하며 생에 거대한 변화를 맞이합니다.</p>
                </div>
            </div>

            <!-- 캐릭터 2 -->
            <div class="char-row reverse">
                <img src="tuwoo.jpg" alt="투우" class="char-img">
                <div class="char-info">
                    <h2 class="char-name">투우</h2>
                    <div class="char-title-sub">젊고 잔혹한 추격자</div>
                    <p class="char-desc">과거 어떤 사건으로 인해 조각에게 깊은 집착과 증오를 품게 된 젊은 청부업자. 노화되어 가는 조각의 틈을 끊임없이 파고들며 그녀를 파멸시키기 위해 무자비한 덫을 놓는 인물입니다.</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
